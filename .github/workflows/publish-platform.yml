name: Publish Platform

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to publish to"
        type: choice
        options: [chrome, firefox]
        required: true
      version:
        description: "Version to publish (e.g. 1.2.0, must match an existing tag)"
        type: string
        required: true

permissions:
  contents: read
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Detect release type
        id: meta
        run: |
          if [[ "${{ inputs.version }}" == *canary* || "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "release_type=canary" >> $GITHUB_OUTPUT
          else
            echo "release_type=" >> $GITHUB_OUTPUT
          fi

      - name: Find original release run for this tag
        id: source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PARENT_SHA=$(git rev-parse "v${{ inputs.version }}^1")
          RUN_ID=$(gh run list --workflow=release.yml --status=success --limit=100 \
            --json databaseId,headSha \
            --jq "[.[] | select(.headSha==\"$PARENT_SHA\") | .databaseId] | first")
          if [[ -z "$RUN_ID" || "$RUN_ID" == "null" ]]; then
            echo "No prior release run; will rebuild from tag."
          else
            echo "Found release run: $RUN_ID"
            echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          fi

      - name: Map platform to build path
        id: paths
        run: |
          case "${{ inputs.platform }}" in
            chrome) echo "build_dir=build/chrome-mv3-prod" >> $GITHUB_OUTPUT ;;
            firefox) echo "build_dir=build/firefox-mv2-prod" >> $GITHUB_OUTPUT ;;
          esac

      - name: Download original build artifact
        id: download
        if: steps.source.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.platform }}-build
          path: ${{ steps.paths.outputs.build_dir }}
          run-id: ${{ steps.source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild extension (fallback)
        if: steps.download.outcome != 'success'
        run: |
          rm -rf "${{ steps.paths.outputs.build_dir }}"
          case "${{ inputs.platform }}" in
            chrome) bun run build ;;
            firefox) bun run build:firefox ;;
          esac

      - name: Publish to Chrome Web Store
        if: inputs.platform == 'chrome'
        env:
          EXTENSION_ID: ${{ secrets.GOOGLE_EXTENSION_ID }}
          PUBLISHER_ID: ${{ secrets.GOOGLE_PUBLISHER_ID }}
          CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          cd build/chrome-mv3-prod && zip -r "../chrome-v${{ inputs.version }}.zip" . && cd -
          bun tooling/publish-chrome.ts "build/chrome-v${{ inputs.version }}.zip"

      - name: Install web-ext
        if: inputs.platform == 'firefox'
        run: npm install -g web-ext

      - name: Sign Firefox Add-on (Canary, unlisted)
        if: inputs.platform == 'firefox' && steps.meta.outputs.release_type == 'canary'
        env:
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
        run: |
          web-ext sign --channel=unlisted \
                       --api-key="$FIREFOX_JWT_ISSUER" \
                       --api-secret="$FIREFOX_JWT_SECRET" \
                       --artifacts-dir=build/signed-firefox \
                       --source-dir=build/firefox-mv2-prod

      - name: Sign and Publish Firefox Add-on (Listed)
        if: inputs.platform == 'firefox' && steps.meta.outputs.release_type == ''
        env:
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
        run: |
          web-ext sign --channel=listed \
                       --api-key="$FIREFOX_JWT_ISSUER" \
                       --api-secret="$FIREFOX_JWT_SECRET" \
                       --upload-source-code \
                       --artifacts-dir=build/signed-firefox \
                       --source-dir=build/firefox-mv2-prod
